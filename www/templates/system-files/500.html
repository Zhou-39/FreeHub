{% extends "base-files/all.html" %}

{% block title %}服务器错误 - 500{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-animation">
            <div class="error-icon">
                <i class="fas fa-server"></i>
            </div>
            <div class="error-number">
                5<span class="zero">0</span>0
            </div>
        </div>
        
        <div class="error-text">
            <h1>服务器内部错误</h1>
            <p>抱歉，服务器遇到了意外情况，无法完成您的请求。</p>
            <div class="error-details">
                <p>技术信息：</p>
                <ul>
                    <li>服务器暂时不可用或维护中</li>
                    <li>数据库连接出现问题</li>
                    <li>应用程序配置错误</li>
                    <li>系统资源不足</li>
                </ul>
                <p style="margin-top: 15px; color: var(--text-secondary); font-size: 0.9rem;">
                    <i class="fas fa-info-circle"></i> 我们的技术团队已收到通知，正在处理此问题。
                </p>
            </div>
        </div>
        
        <div class="error-actions">
            <button class="btn btn-primary" onclick="refreshPage()">
                <i class="fas fa-redo"></i> 重试请求
            </button>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a href="/contact" class="btn btn-outline">
                <i class="fas fa-headset"></i> 技术支持
            </a>
        </div>
        
        <div class="error-search">
            <p>或者，您可以搜索其他内容：</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入关键词搜索...">
                <button class="btn btn-search" onclick="performSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style nonce="{{ request.nonce }}">
.error-icon {
    color: var(--danger);
}
</style>

<script nonce="{{ request.nonce }}">
function refreshPage() {
    window.location.reload();
}

function performSearch() {
    const searchTerm = document.getElementById('searchInput').value.trim();
    if (searchTerm) {
        window.location.href = `/search?q=${encodeURIComponent(searchTerm)}`;
    } else {
        alert('请输入搜索关键词');
    }
}

document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        performSearch();
    }
});
</script>
{% endblock %}
