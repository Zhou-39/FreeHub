{% extends "base-files/all.html" %}

{% block title %}帖子列表{% endblock %}

{% block content %}
<div class="posts-container">
    <div class="page-header">
        <h1><i class="fas fa-comments"></i> 帖子列表</h1>
        <p>参与社区讨论，分享你的想法</p>
        {% if session.get('current_uid') %}
        <a href="/user/post/create" class="btn btn-primary">
            <i class="fas fa-plus-circle"></i> 发帖
        </a>
        {% endif %}
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div class="filter-tabs">
            <a href="?sort=latest" class="filter-tab {% if request.args.get('sort', 'latest') == 'latest' %}active{% endif %}">
                <i class="fas fa-clock"></i> 最新
            </a>
            <a href="?sort=popular" class="filter-tab {% if request.args.get('sort') == 'popular' %}active{% endif %}">
                <i class="fas fa-fire"></i> 最热
            </a>
            <a href="?sort=most_viewed" class="filter-tab {% if request.args.get('sort') == 'most_viewed' %}active{% endif %}">
                <i class="fas fa-eye"></i> 最多浏览
            </a>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索帖子..." value="{{ request.args.get('q', '') }}">
            <button class="btn-search" id="searchBtn">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <!-- 帖子列表 -->
    <div class="posts-list" id="postsList">
        <!-- 帖子将通过JavaScript动态加载 -->
    </div>

    <!-- 加载更多 -->
    <div class="load-more" id="loadMore">
        <button class="btn btn-outline" id="loadMoreBtn">
            <i class="fas fa-spinner"></i> 加载更多
        </button>
    </div>

    <!-- 加载中 -->
    <div class="loading-spinner hidden" id="loading">
        <i class="fas fa-spinner fa-spin"></i> 加载中...
    </div>

    <!-- 无结果提示 -->
    <div class="no-results hidden" id="noResults">
        <i class="fas fa-search"></i>
        <h3>暂无帖子</h3>
        <p>还没有发布任何帖子，来发第一篇吧！</p>
        {% if session.get('current_uid') %}
        <a href="/user/post/create" class="btn btn-primary">
            <i class="fas fa-pen"></i> 发帖
        </a>
        {% endif %}
    </div>
</div>

<style nonce="{{ request.nonce }}">
/* 复用 articles.html 的样式，但稍作调整 */
.posts-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

.page-header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
}

.page-header h1 {
    font-size: 2.5rem;
    color: var(--text-primary);
    margin-bottom: 10px;
}

.page-header h1 i {
    color: var(--primary);
    margin-right: 10px;
}

.page-header p {
    color: var(--text-secondary);
    font-size: 1.1rem;
    margin-bottom: 20px;
}

.page-header .btn {
    position: absolute;
    right: 0;
    top: 0;
}

.filter-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 15px;
    background: var(--bg-secondary);
    padding: 15px 20px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
}

.filter-tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.filter-tab {
    padding: 8px 16px;
    border-radius: 20px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border-color);
}

.filter-tab:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.filter-tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

.search-box {
    display: flex;
    gap: 10px;
}

.search-box input {
    padding: 8px 15px;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 250px;
    transition: all 0.3s ease;
}

.search-box input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
}

.btn-search {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-search:hover {
    transform: scale(1.1);
}

.posts-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 30px;
}

.post-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 25px;
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
}

.post-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 20px var(--shadow);
}

.post-title {
    font-size: 1.4rem;
    margin-bottom: 15px;
}

.post-title a {
    color: var(--text-primary);
    text-decoration: none;
    transition: color 0.3s ease;
}

.post-title a:hover {
    color: var(--primary);
}

.post-meta {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
    color: var(--text-secondary);
    font-size: 0.9rem;
    flex-wrap: wrap;
}

.post-author {
    display: flex;
    align-items: center;
    gap: 5px;
}

.post-author i {
    color: var(--primary);
}

.post-excerpt {
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 20px;
    font-size: 1rem;
}

.post-tags {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
}

.tag {
    padding: 4px 10px;
    border-radius: 15px;
    font-size: 0.75rem;
    font-weight: 600;
}

.tag.category {
    background: var(--primary);
    color: white;
}

.tag.popular {
    background: var(--danger);
    color: white;
}

.tag.new {
    background: var(--success);
    color: white;
}

.post-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 15px;
    border-top: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.post-stats {
    display: flex;
    gap: 20px;
}

.post-stats span {
    display: flex;
    align-items: center;
    gap: 5px;
}

.post-stats i {
    color: var(--primary);
}

.read-more {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s ease;
}

.read-more:hover {
    gap: 8px;
}

.load-more {
    text-align: center;
    margin: 40px 0;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
}

.btn-outline {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
}

.btn-outline:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
}

.loading-spinner.hidden {
    display: none;
}

.loading-spinner i {
    margin-right: 8px;
}

.no-results {
    text-align: center;
    padding: 60px 20px;
    background: var(--bg-secondary);
    border-radius: 12px;
    border: 2px dashed var(--border-color);
}

.no-results.hidden {
    display: none;
}

.no-results i {
    font-size: 4rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
    opacity: 0.5;
}

.no-results h3 {
    color: var(--text-primary);
    margin-bottom: 10px;
}

.no-results p {
    color: var(--text-secondary);
    margin-bottom: 25px;
}

/* 错误消息样式 */
.error-message {
    text-align: center;
    padding: 40px;
    background: var(--bg-secondary);
    border-radius: 12px;
    border: 1px solid var(--danger);
    margin: 20px 0;
}

.error-message i {
    font-size: 3rem;
    color: var(--danger);
    margin-bottom: 15px;
}

.error-message h3 {
    color: var(--text-primary);
    margin-bottom: 10px;
}

.error-message p {
    color: var(--text-secondary);
}

@media (max-width: 768px) {
    .page-header .btn {
        position: static;
        margin-top: 15px;
    }
    
    .filter-bar {
        flex-direction: column;
        align-items: stretch;
    }
    
    .search-box input {
        width: 100%;
    }
    
    .post-meta {
        gap: 10px;
    }
}
</style>

<script nonce="{{ request.nonce }}">
let currentPage = 1;
let loading = false;
let hasMore = true;
let currentSort = '{{ request.args.get("sort", "latest") }}';
let currentSearch = '{{ request.args.get("q", "") }}';

document.addEventListener('DOMContentLoaded', function() {
    loadPosts(true);
    
    // 搜索按钮点击事件
    const searchBtn = document.getElementById('searchBtn');
    if (searchBtn) {
        searchBtn.addEventListener('click', searchPosts);
    }
    
    // 搜索输入框回车事件
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPosts();
            }
        });
    }
    
    // 加载更多按钮点击事件
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (loadMoreBtn) {
        loadMoreBtn.addEventListener('click', loadMorePosts);
    }
    
    // 筛选标签点击事件
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function(e) {
            e.preventDefault();
            const url = new URL(this.href);
            currentSort = url.searchParams.get('sort') || 'latest';
            currentPage = 1;
            
            // 更新URL
            window.history.pushState({}, '', this.href);
            
            loadPosts(true);
        });
    });
});

async function loadPosts(reset = false) {
    if (loading) return;
    
    if (reset) {
        currentPage = 1;
        hasMore = true;
        document.getElementById('postsList').innerHTML = '';
    }
    
    if (!hasMore) return;
    
    loading = true;
    const loadingEl = document.getElementById('loading');
    const loadMoreEl = document.getElementById('loadMore');
    
    if (loadingEl) loadingEl.classList.remove('hidden');
    if (loadMoreEl) loadMoreEl.style.display = 'none';
    
    try {
        const url = new URL('/user/posts', window.location.origin);
        url.searchParams.append('page', currentPage);
        url.searchParams.append('per_page', 10);
        url.searchParams.append('sort', currentSort);
        if (currentSearch) {
            url.searchParams.append('q', currentSearch);
        }
        
        console.log('Loading posts from:', url.toString());
        
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'Accept': 'application/json'
            }
        });
        
        // 检查响应类型
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            const text = await response.text();
            console.error('Received non-JSON response:', text.substring(0, 200));
            throw new Error('服务器返回了非JSON数据');
        }
        
        const data = await response.json();
        console.log('Received data:', data);
        
        if (data.success) {
            if (data.data.length === 0 && currentPage === 1) {
                const noResultsEl = document.getElementById('noResults');
                if (noResultsEl) noResultsEl.classList.remove('hidden');
                if (loadMoreEl) loadMoreEl.style.display = 'none';
            } else {
                const noResultsEl = document.getElementById('noResults');
                if (noResultsEl) noResultsEl.classList.add('hidden');
                renderPosts(data.data);
                
                if (data.has_next) {
                    currentPage++;
                    if (loadMoreEl) loadMoreEl.style.display = 'block';
                } else {
                    hasMore = false;
                    if (loadMoreEl) loadMoreEl.style.display = 'none';
                }
            }
        } else {
            console.error('API returned error:', data);
        }
    } catch (error) {
        console.error('加载帖子失败:', error);
        // 显示错误信息给用户
        const postsList = document.getElementById('postsList');
        if (postsList) {
            postsList.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>加载失败</h3>
                    <p>${escapeHtml(error.message || '请刷新页面重试')}</p>
                </div>
            `;
        }
    } finally {
        loading = false;
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.classList.add('hidden');
    }
}

function renderPosts(posts) {
    const container = document.getElementById('postsList');
    if (!container) return;
    
    if (!posts || posts.length === 0) {
        return;
    }
    
    posts.forEach(post => {
        const card = createPostCard(post);
        container.appendChild(card);
    });
}

function createPostCard(post) {
    const card = document.createElement('div');
    card.className = 'post-card';
    
    // 截取内容预览
    const excerpt = post.content && post.content.length > 200 ? 
        post.content.substring(0, 200) + '...' : 
        post.content || '';
    
    // 格式化时间
    let timeStr = '';
    try {
        const time = new Date(post.created_at);
        timeStr = time.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    } catch (e) {
        timeStr = post.created_at || '';
    }
    
    card.innerHTML = `
        <h2 class="post-title">
            <a href="/user/post/${post.id}">${escapeHtml(post.title)}</a>
        </h2>
        <div class="post-meta">
            <span class="post-author">
                <i class="fas fa-user-circle"></i>
                ${escapeHtml(post.author.nickname)} (UID: ${post.author.uid})
            </span>
            <span><i class="far fa-clock"></i> ${timeStr}</span>
        </div>
        <div class="post-excerpt">
            ${escapeHtml(excerpt)}
        </div>
        <div class="post-tags">
            <span class="tag category">帖子</span>
            ${post.views > 1000 ? '<span class="tag popular">热门</span>' : ''}
            ${isNew(post.created_at) ? '<span class="tag new">最新</span>' : ''}
        </div>
        <div class="post-footer">
            <div class="post-stats">
                <span><i class="far fa-eye"></i> ${post.views || 0}</span>
                <span><i class="far fa-heart"></i> ${post.likes || 0}</span>
            </div>
            <a href="/user/post/${post.id}" class="read-more">
                阅读全文 <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    `;
    
    return card;
}

function loadMorePosts() {
    loadPosts();
}

function searchPosts() {
    const searchInput = document.getElementById('searchInput');
    if (!searchInput) return;
    
    currentSearch = searchInput.value.trim();
    currentPage = 1;
    
    // 更新URL参数
    const url = new URL(window.location);
    if (currentSearch) {
        url.searchParams.set('q', currentSearch);
    } else {
        url.searchParams.delete('q');
    }
    window.history.pushState({}, '', url);
    
    loadPosts(true);
}

function isNew(dateString) {
    try {
        const postDate = new Date(dateString);
        const now = new Date();
        const diffDays = (now - postDate) / (1000 * 60 * 60 * 24);
        return diffDays < 7;
    } catch (e) {
        return false;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
