{% extends "base-files/all.html" %}

{% block title %}页面未找到 - 404{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-animation">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="error-number">
                4<span class="zero">0</span>4
            </div>
        </div>
        
        <div class="error-text">
            <h1>页面未找到</h1>
            <p>抱歉，您访问的页面不存在或已被移动。</p>
            <div class="error-details">
                <p>可能的原因：</p>
                <ul>
                    <li>页面地址输入错误</li>
                    <li>页面已被删除或移动</li>
                    <li>链接已过期</li>
                </ul>
            </div>
        </div>
        
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回上页
            </a>
            <button class="btn btn-outline" onclick="refreshPage()">
                <i class="fas fa-redo"></i> 刷新页面
            </button>
        </div>
        
        <div class="error-search">
            <p>或者，您可以在本站搜索您需要的内容：</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入关键词搜索...">
                <button class="btn btn-search" onclick="performSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style nonce="{{ request.nonce }}">
.error-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 120px);
    padding: 40px 20px;
}

.error-content {
    text-align: center;
    max-width: 600px;
    width: 100%;
}

.error-animation {
    margin-bottom: 30px;
    position: relative;
}

.error-icon {
    font-size: 5rem;
    color: var(--warning);
    margin-bottom: 20px;
    animation: pulse 2s infinite;
}

.error-number {
    font-size: 8rem;
    font-weight: 900;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 10px;
    text-shadow: 3px 3px 0 var(--shadow);
}

.zero {
    color: var(--primary);
    display: inline-block;
    animation: float 3s ease-in-out infinite;
}

.error-text h1 {
    font-size: 2.5rem;
    color: var(--text-primary);
    margin-bottom: 15px;
    font-weight: 700;
}

.error-text > p {
    font-size: 1.2rem;
    color: var(--text-secondary);
    margin-bottom: 25px;
    line-height: 1.5;
}

.error-details {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 20px;
    margin: 25px 0;
    border: 1px solid var(--border-color);
    text-align: left;
}

.error-details p {
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 10px;
}

.error-details ul {
    color: var(--text-secondary);
    padding-left: 20px;
    margin: 0;
}

.error-details li {
    margin-bottom: 8px;
    line-height: 1.4;
}

.error-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin: 30px 0;
    flex-wrap: wrap;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
}

.btn-secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
}

.btn-secondary:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.btn-outline {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
}

.btn-outline:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.btn-search {
    padding: 10px 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 0 8px 8px 0;
    cursor: pointer;
}

.error-search {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid var(--border-color);
}

.error-search p {
    color: var(--text-secondary);
    margin-bottom: 15px;
}

.search-box {
    display: flex;
    max-width: 400px;
    margin: 0 auto;
}

.search-box input {
    flex: 1;
    padding: 12px 15px;
    border: 1px solid var(--border-color);
    border-radius: 8px 0 0 8px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
}

.search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
}

@keyframes pulse {
    0% {
        transform: scale(1);
        opacity: 1;
    }
    50% {
        transform: scale(1.05);
        opacity: 0.8;
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes float {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-10px);
    }
    100% {
        transform: translateY(0px);
    }
}

@media (max-width: 768px) {
    .error-number {
        font-size: 6rem;
    }
    
    .error-text h1 {
        font-size: 2rem;
    }
    
    .error-actions {
        flex-direction: column;
        align-items: center;
    }
    
    .btn {
        width: 100%;
        max-width: 250px;
        justify-content: center;
    }
}
</style>

<script nonce="{{ request.nonce }}">
function refreshPage() {
    window.location.reload();
}

function performSearch() {
    const searchTerm = document.getElementById('searchInput').value.trim();
    if (searchTerm) {
        // 这里可以替换为实际的搜索URL
        window.location.href = `/search?q=${encodeURIComponent(searchTerm)}`;
    } else {
        alert('请输入搜索关键词');
    }
}

// 允许按Enter键进行搜索
document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        performSearch();
    }
});
</script>
{% endblock %}
