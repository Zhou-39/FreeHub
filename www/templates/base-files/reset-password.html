{% extends "base-files/all.html" %}

{% block title %}重置密码{% endblock %}

{% block content %}
<div class="auth-container">
    {% if valid %}
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-lock"></i>
            <h1>重置密码</h1>
        </div>

        <div class="auth-body">
            <div class="card-header">
                <h2>设置新密码</h2>
                <p>请输入您的新密码并确认</p>
            </div>

            <form id="resetPasswordForm" method="POST" action="/{{ basic_url }}/reset-password?token={{ token }}&user_id={{ user_id }}">
                <!-- 新密码输入框 -->
                <div class="form-group">
                    <input type="password" class="input-field" id="password" name="password" placeholder=" " required>
                    <label for="password" class="input-label">
                        <i class="fas fa-lock"></i> 新密码
                    </label>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                    <div class="error-message" id="password-error">
                        密码必须包含大小写字母和数字，长度8-30个字符
                    </div>
                </div>

                <!-- 确认密码输入框 -->
                <div class="form-group">
                    <input type="password" class="input-field" id="confirmPassword" name="confirmPassword" placeholder=" " required>
                    <label for="confirmPassword" class="input-label">
                        <i class="fas fa-lock"></i> 确认密码
                    </label>
                    <button type="button" class="password-toggle" id="toggleConfirmPassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                    <div class="error-message" id="confirmPassword-error">
                        两次输入的密码不一致
                    </div>
                </div>

                <!-- 验证码输入框 -->
                <div class="form-group">
                    <div class="captcha-group">
                        <div class="captcha-input">
                            <input type="text" class="input-field" id="captcha" name="captcha" placeholder=" " maxlength="6" autocomplete="off" required>
                            <label for="captcha" class="input-label">
                                <i class="fas fa-shield-alt"></i> 验证码
                            </label>
                        </div>
                        <div class="captcha-image" id="refreshCaptchaBtn">
                            <img src="/captcha" name="captcha" alt="验证码">
                        </div>
                    </div>
                    <div class="error-message" id="captcha-error">
                        请输入正确的验证码
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-check-circle"></i> 重置密码
                </button>

                <div class="success-message" id="success-message">
                    密码重置成功，3秒后跳转到登录页面
                </div>
            </form>

            <div class="auth-footer">
                <a href="/{{ basic_url }}/login"><i class="fas fa-sign-in-alt"></i> 返回登录</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="auth-card">
        <div class="invalid-link">
            <i class="fas fa-exclamation-triangle"></i>
            <h2>链接无效或已过期</h2>
            <p>该密码重置链接无效、已使用或已过期，请重新申请密码重置。</p>
            <a href="/{{ basic_url }}/forgot-password" class="btn btn-primary">
                <i class="fas fa-redo"></i> 重新申请密码重置
            </a>
        </div>
    </div>
    {% endif %}
</div>

<style nonce="{{ request.nonce }}">
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
}

.auth-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    box-shadow: 0 10px 30px var(--shadow);
    padding: 40px;
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--border-color);
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-header i {
    font-size: 3rem;
    color: var(--primary);
    margin-bottom: 15px;
}

.auth-header h1 {
    font-size: 1.8rem;
    color: var(--text-primary);
    margin-bottom: 8px;
}

.card-header {
    text-align: center;
    margin-bottom: 30px;
}

.card-header h2 {
    font-size: 1.5rem;
    color: var(--text-primary);
    margin-bottom: 8px;
}

.card-header p {
    color: var(--text-secondary);
    font-size: 1rem;
}

.form-group {
    position: relative;
    margin-bottom: 28px;
}

.input-field {
    width: 100%;
    padding: 18px 16px 10px 16px;
    border: none;
    border-bottom: 2px solid var(--border-color);
    background-color: transparent;
    font-size: 1rem;
    transition: all 0.3s ease;
    outline: none;
    color: var(--text-primary);
}

.input-field:focus {
    border-bottom-color: var(--primary);
}

.input-label {
    position: absolute;
    top: 18px;
    left: 16px;
    font-size: 1rem;
    color: var(--text-secondary);
    pointer-events: none;
    transition: all 0.3s ease;
}

.input-field:focus + .input-label,
.input-field:not(:placeholder-shown) + .input-label {
    top: 2px;
    left: 12px;
    font-size: 0.8rem;
    color: var(--primary);
    font-weight: 600;
}

.error-message {
    display: none;
    color: var(--danger);
    font-size: 0.8rem;
    margin-top: 6px;
    padding-left: 5px;
}

.success-message {
    display: none;
    color: var(--success);
    font-size: 0.9rem;
    margin-top: 10px;
    padding: 10px;
    background-color: rgba(74, 222, 128, 0.1);
    border-radius: 6px;
    text-align: center;
    border: 1px solid rgba(74, 222, 128, 0.2);
}

.password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.3s ease;
}

.password-toggle:hover {
    color: var(--primary);
}

.captcha-group {
    display: flex;
    gap: 10px;
}

.captcha-input {
    flex: 1;
}

.captcha-image {
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border-color);
    width: 100px;
    height: 40px;
    background: var(--bg-primary);
}

.captcha-image img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.btn-primary {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 20px;
    text-decoration: none;
    text-align: center;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
}

.btn-primary:disabled {
    background: var(--text-secondary);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.auth-footer {
    display: flex;
    justify-content: center;
    margin-top: 20px;
    font-size: 0.9rem;
}

.auth-footer a {
    color: var(--primary-light);
    text-decoration: none;
    transition: all 0.3s ease;
}

.auth-footer a:hover {
    color: var(--primary);
    text-decoration: underline;
}

.invalid-link {
    text-align: center;
    padding: 20px;
}

.invalid-link i {
    font-size: 4rem;
    color: var(--danger);
    margin-bottom: 20px;
}

.invalid-link h2 {
    color: var(--text-primary);
    margin-bottom: 15px;
}

.invalid-link p {
    color: var(--text-secondary);
    margin-bottom: 25px;
    line-height: 1.5;
}
</style>

<script nonce="{{ request.nonce }}">
document.addEventListener('DOMContentLoaded', function() {
    // DOM元素
    const resetPasswordForm = document.getElementById('resetPasswordForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const captchaInput = document.getElementById('captcha');
    const togglePassword = document.getElementById('togglePassword');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const refreshCaptchaBtn = document.getElementById('refreshCaptchaBtn');
    const submitBtn = document.getElementById('submitBtn');
    const passwordError = document.getElementById('password-error');
    const confirmPasswordError = document.getElementById('confirmPassword-error');
    const captchaError = document.getElementById('captcha-error');
    const successMessage = document.getElementById('success-message');

    // 密码可见性切换
    if (togglePassword) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
    }

    if (toggleConfirmPassword) {
        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
    }

    // 刷新验证码
    if (refreshCaptchaBtn) {
        refreshCaptchaBtn.addEventListener('click', refreshCaptcha);
    }

    // 密码实时验证
    if (passwordInput) {
        passwordInput.addEventListener('input', function() {
            validatePassword();
            validatePasswordsMatch();
        });
    }

    // 确认密码实时验证
    if (confirmPasswordInput) {
        confirmPasswordInput.addEventListener('input', function() {
            validatePasswordsMatch();
        });
    }

    // 验证码实时验证
    if (captchaInput) {
        captchaInput.addEventListener('input', function() {
            if (this.value.length === 0) {
                if (captchaError) captchaError.style.display = 'none';
            } else {
                if (captchaError) captchaError.style.display = 'none';
            }
        });
    }

    // 表单提交处理
    if (resetPasswordForm) {
        resetPasswordForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // 获取表单值
            const password = passwordInput ? passwordInput.value : '';
            const confirmPassword = confirmPasswordInput ? confirmPasswordInput.value : '';
            const captcha = captchaInput ? captchaInput.value : '';

            // 验证密码
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const isPasswordValid = password.length >= 8 && password.length <= 30 &&
                                  hasUpperCase && hasLowerCase && hasNumber;
            // 验证确认密码
            const isConfirmPasswordValid = password === confirmPassword;
            // 验证验证码
            const isCaptchaValid = captcha.length > 0;

            // 显示错误信息
            if (!isPasswordValid && passwordError) {
                passwordError.style.display = 'block';
            }

            if (!isConfirmPasswordValid && confirmPasswordError) {
                confirmPasswordError.style.display = 'block';
            }

            if (!isCaptchaValid && captchaError) {
                captchaError.style.display = 'block';
            }

            // 如果验证通过
            if (isPasswordValid && isConfirmPasswordValid && isCaptchaValid) {
                // 禁用提交按钮
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中...';
                }

                // 计算密码的SHA-256哈希
                const hashedPassword = await hashString(password);

                // 发送表单数据到服务器
                const formData = new FormData();
                formData.append('password', hashedPassword);
                formData.append('confirmPassword', await hashString(confirmPassword));
                formData.append('captcha', captcha);

                // 发送表单数据到服务器
                fetch(resetPasswordForm.action, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data['success']) {
                        // 显示成功消息
                        if (successMessage) successMessage.style.display = 'block';
                        if (passwordError) passwordError.style.display = 'none';
                        if (confirmPasswordError) confirmPasswordError.style.display = 'none';
                        if (captchaError) captchaError.style.display = 'none';

                        // 3秒后跳转到登录页面
                        setTimeout(() => {
                            window.location.href = '/{{ basic_url }}/login';
                        }, 3000);
                    } else {
                        // 显示错误消息
                        if (data['error'].includes('验证码')) {
                            if (captchaError) {
                                captchaError.textContent = data['error'];
                                captchaError.style.display = 'block';
                            }
                        } else if (data['error'].includes('密码')) {
                            if (passwordError) {
                                passwordError.textContent = data['error'];
                                passwordError.style.display = 'block';
                            }
                        } else {
                            alert(data['error']);
                        }
                    }
                })
                .catch(error => {
                    console.error('请求失败:', error);
                    alert('网络错误，请稍后重试');
                })
                .finally(() => {
                    // 恢复提交按钮
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> 重置密码';
                    }
                });
            }
        });
    }

    function validatePassword() {
        const password = passwordInput ? passwordInput.value : '';
        const hasUpperCase = /[A-Z]/.test(password);
        const hasLowerCase = /[a-z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const isValid = password.length >= 8 && password.length <= 30 &&
                        hasUpperCase && hasLowerCase && hasNumber;

        if (password.length === 0) {
            if (passwordError) passwordError.style.display = 'none';
        } else if (!isValid) {
            if (passwordError) passwordError.style.display = 'block';
        } else {
            if (passwordError) passwordError.style.display = 'none';
        }
    }

    function validatePasswordsMatch() {
        const password = passwordInput ? passwordInput.value : '';
        const confirmPassword = confirmPasswordInput ? confirmPasswordInput.value : '';

        if (confirmPassword.length === 0) {
            if (confirmPasswordError) confirmPasswordError.style.display = 'none';
        } else if (password !== confirmPassword) {
            if (confirmPasswordError) confirmPasswordError.style.display = 'block';
        } else {
            if (confirmPasswordError) confirmPasswordError.style.display = 'none';
        }
    }

    // 刷新验证码
    function refreshCaptcha() {
        const img = document.querySelector('img[name="captcha"]');
        if (img) {
            img.src = '/captcha?' + new Date().getTime();
        }
        if (captchaInput) {
            captchaInput.value = '';
        }
    }

    // 哈希字符串函数
    async function hashString(str) {
        const encoder = new TextEncoder();
        const data = encoder.encode(str);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(byte => byte.toString(16).padStart(2, '0')).join('');
        return hashHex;
    }

    // 初始时隐藏错误信息
    if (passwordError) passwordError.style.display = 'none';
    if (confirmPasswordError) confirmPasswordError.style.display = 'none';
    if (captchaError) captchaError.style.display = 'none';
    if (successMessage) successMessage.style.display = 'none';
});
</script>
{% endblock %}
