{% extends "base-files/all.html" %}

{% block title %}编辑帖子 - {{ post.title }}{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>编辑帖子</h1>
        <p class="page-subtitle">当前身份：{{ uid.nickname }} (子账户)</p>
    </div>
    <div class="edit-post-container">
        <form id="postForm" method="POST" action="{{ url_for('user.edit_post', post_id=post.id) }}">
            <div class="form-group">
                <label for="title">帖子标题 <span class="required">*</span></label>
                <input type="text" id="title" name="title" class="input-field" 
                       value="{{ post.title }}" maxlength="100" required>
                <div class="char-counter">
                    <span id="titleCount">{{ post.title|length }}</span>/100
                </div>
            </div>

            <div class="form-group">
                <label for="content">帖子内容 <span class="required">*</span></label>
                <textarea id="content" name="content" class="input-field textarea-field" 
                          rows="15" required>{{ post.content }}</textarea>
                <div class="char-counter">
                    <span id="contentCount">{{ post.content|length }}</span>/50000
                </div>
            </div>

            <div class="form-group">
                <label for="category">分类</label>
                <select id="category" name="category" class="input-field">
                    <option value="">请选择分类</option>
                    <option value="news" {% if post.category == 'news' %}selected{% endif %}>新闻</option>
                    <option value="technology" {% if post.category == 'technology' %}selected{% endif %}>科技</option>
                    <option value="entertainment" {% if post.category == 'entertainment' %}selected{% endif %}>娱乐</option>
                    <option value="sports" {% if post.category == 'sports' %}selected{% endif %}>体育</option>
                    <option value="others" {% if post.category == 'others' %}selected{% endif %}>其他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tags">标签</label>
                <input type="text" id="tags" name="tags" class="input-field" 
                       placeholder="使用逗号分隔标签" value="{{ post.tags }}">
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="status" {% if post.status %}checked{% endif %}>
                    <span class="checkmark"></span>
                    发布帖子
                </label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="cancelBtn">
                    <i class="fas fa-times"></i> 取消
                </button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-save"></i> 保存修改
                </button>
            </div>
        </form>
    </div>
</div>

<style nonce="{{ request.nonce }}">
.page-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}
.page-header {
    text-align: center;
    margin-bottom: 50px;
}
.page-header h1 {
    font-size: 3rem;
    color: var(--text-primary);
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.page-header p {
    font-size: 1.2rem;
    color: var(--text-secondary);
}
.edit-post-container {
    padding: 30px;
    border-radius: 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.edit-post-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px var(--shadow);
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    color: var(--text-primary);
}
.form-group label .required {
    color: var(--danger);
}
.input-field {
    width: 100%;
    padding: 12px 15px;
    border-radius: 6px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 1rem;
    transition: all 0.3s ease;
    border: 1px solid var(--border-color);
}
.input-field:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
}
.input-field::placeholder {
    color: var(--text-muted);
    opacity: 0.8;
}
.textarea-field {
    resize: vertical;
    color: var(--text-primary);
    background: var(--bg-primary);
}
select.input-field {
    color: var(--text-primary);
    background: var(--bg-primary);
}
select.input-field option {
    background: var(--bg-secondary);
    color: var(--text-primary);
}
.char-counter {
    text-align: right;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 4px;
}
.char-counter span {
    color: var(--primary);
    font-weight: 600;
}
.checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1rem;
    color: var(--text-primary);
    cursor: pointer;
}
.checkbox-label input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--primary);
}
.checkbox-label a {
    color: var(--primary);
}
.checkbox-label a:hover {
    text-decoration: underline;
}
.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}
.btn {
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: normal;
    border: none;
    border-radius: 6px;
}
.btn-secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
}
.btn-secondary:hover {
    background: var(--primary-light);
    color: white;
}
.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
}
@media (max-width: 768px) {
    .page-header h1 {
        font-size: 2.5rem;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-actions {
        flex-direction: column;
        align-items: flex-end;
    }
}
</style>

<script nonce="{{ request.nonce }}">
document.addEventListener('DOMContentLoaded', function() {
    const titleInput = document.getElementById('title');
    const contentInput = document.getElementById('content');
    const titleCount = document.getElementById('titleCount');
    const contentCount = document.getElementById('contentCount');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const form = document.getElementById('postForm');

    // 标题字数统计
    if (titleInput && titleCount) {
        titleInput.addEventListener('input', function() {
            titleCount.textContent = this.value.length;
        });
    }

    // 内容字数统计
    if (contentInput && contentCount) {
        contentInput.addEventListener('input', function() {
            contentCount.textContent = this.value.length;
        });
    }

    // 取消按钮
    if (cancelBtn) {
        cancelBtn.addEventListener('click', function() {
            if (confirm('确定要取消编辑吗？所有修改将丢失。')) {
                history.back();
            }
        });
    }

    // 表单提交
    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            const category = document.getElementById('category').value;
            const tags = document.getElementById('tags').value;
            const status = document.querySelector('input[name="status"]').checked;

            if (!title) {
                alert('请输入帖子标题');
                return;
            }

            if (title.length > 100) {
                alert('标题不能超过100个字符');
                return;
            }

            if (!content) {
                alert('请输入帖子内容');
                return;
            }

            if (content.length > 50000) {
                alert('内容不能超过50000个字符');
                return;
            }

            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';
            }

            try {
                const response = await fetch(this.action, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        category: category,
                        tags: tags,
                        status: status
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('帖子更新成功！');
                    window.location.href = `/user/post/{{ post.id }}`;
                } else {
                    alert(data.error || '更新失败');
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-save"></i> 保存修改';
                    }
                }
            } catch (error) {
                console.error('更新失败:', error);
                alert('网络错误，请稍后重试');
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-save"></i> 保存修改';
                }
            }
        });
    }
});
</script>
{% endblock %}
