{% extends "base-files/all.html" %}

{% block title %}文章列表{% endblock %}

{% block content %}
<div class="articles-container">
    <div class="page-header">
        <h1><i class="fas fa-book"></i> 文章列表</h1>
        <p>探索社区精彩文章</p>
        {% if session.get('current_uid') %}
        <a href="/user/article/create" class="btn btn-primary">
            <i class="fas fa-plus-circle"></i> 写文章
        </a>
        {% endif %}
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div class="filter-tabs">
            <a href="?sort=latest" class="filter-tab {% if request.args.get('sort', 'latest') == 'latest' %}active{% endif %}">
                <i class="fas fa-clock"></i> 最新
            </a>
            <a href="?sort=popular" class="filter-tab {% if request.args.get('sort') == 'popular' %}active{% endif %}">
                <i class="fas fa-fire"></i> 最热
            </a>
            <a href="?sort=most_viewed" class="filter-tab {% if request.args.get('sort') == 'most_viewed' %}active{% endif %}">
                <i class="fas fa-eye"></i> 最多浏览
            </a>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索文章..." value="{{ request.args.get('q', '') }}">
            <button class="btn-search" id="searchBtn">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <!-- 文章列表 -->
    <div class="articles-grid" id="articlesList">
        <!-- 文章将通过JavaScript动态加载 -->
    </div>

    <!-- 加载更多 -->
    <div class="load-more" id="loadMore">
        <button class="btn btn-outline" id="loadMoreBtn">
            <i class="fas fa-spinner"></i> 加载更多
        </button>
    </div>

    <!-- 加载中 -->
    <div class="loading-spinner" id="loading" style="display: none;">
        <i class="fas fa-spinner fa-spin"></i> 加载中...
    </div>

    <!-- 无结果提示 -->
    <div class="no-results" id="noResults" style="display: none;">
        <i class="fas fa-search"></i>
        <h3>暂无文章</h3>
        <p>还没有发布任何文章，来写第一篇吧！</p>
        {% if session.get('current_uid') %}
        <a href="/user/article/create" class="btn btn-primary">
            <i class="fas fa-pen"></i> 写文章
        </a>
        {% endif %}
    </div>
</div>

<style nonce="{{ request.nonce }}">
.articles-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

.page-header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
}

.page-header h1 {
    font-size: 2.5rem;
    color: var(--text-primary);
    margin-bottom: 10px;
}

.page-header h1 i {
    color: var(--primary);
    margin-right: 10px;
}

.page-header p {
    color: var(--text-secondary);
    font-size: 1.1rem;
    margin-bottom: 20px;
}

.page-header .btn {
    position: absolute;
    right: 0;
    top: 0;
}

.filter-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 15px;
    background: var(--bg-secondary);
    padding: 15px 20px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
}

.filter-tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.filter-tab {
    padding: 8px 16px;
    border-radius: 20px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border-color);
}

.filter-tab:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.filter-tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

.search-box {
    display: flex;
    gap: 10px;
}

.search-box input {
    padding: 8px 15px;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 250px;
    transition: all 0.3s ease;
}

.search-box input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
}

.btn-search {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-search:hover {
    transform: scale(1.1);
}

.articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 25px;
    margin-bottom: 30px;
}

.article-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.article-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px var(--shadow);
}

.article-header {
    padding: 20px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-primary);
}

.article-title {
    font-size: 1.3rem;
    margin-bottom: 10px;
}

.article-title a {
    color: var(--text-primary);
    text-decoration: none;
    transition: color 0.3s ease;
}

.article-title a:hover {
    color: var(--primary);
}

.article-meta {
    display: flex;
    gap: 15px;
    color: var(--text-secondary);
    font-size: 0.85rem;
    flex-wrap: wrap;
}

.article-meta span {
    display: flex;
    align-items: center;
    gap: 5px;
}

.article-author {
    display: flex;
    align-items: center;
    gap: 5px;
}

.article-author i {
    color: var(--primary);
}

.article-content {
    padding: 20px;
    flex: 1;
}

.article-excerpt {
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 15px;
    font-size: 0.95rem;
}

.article-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

.tag {
    padding: 4px 10px;
    border-radius: 15px;
    font-size: 0.75rem;
    font-weight: 600;
}

.tag.category {
    background: var(--primary);
    color: white;
}

.tag.popular {
    background: var(--danger);
    color: white;
}

.tag.new {
    background: var(--success);
    color: white;
}

.article-footer {
    padding: 15px 20px;
    background: var(--bg-primary);
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.article-stats {
    display: flex;
    gap: 15px;
}

.article-stats span {
    display: flex;
    align-items: center;
    gap: 5px;
}

.article-stats i {
    color: var(--primary);
}

.read-more {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s ease;
}

.read-more:hover {
    gap: 8px;
}

.load-more {
    text-align: center;
    margin: 40px 0;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
}

.btn-outline {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
}

.btn-outline:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
}

.loading-spinner i {
    margin-right: 8px;
}

.no-results {
    text-align: center;
    padding: 60px 20px;
    background: var(--bg-secondary);
    border-radius: 12px;
    border: 2px dashed var(--border-color);
}

.no-results i {
    font-size: 4rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
    opacity: 0.5;
}

.no-results h3 {
    color: var(--text-primary);
    margin-bottom: 10px;
}

.no-results p {
    color: var(--text-secondary);
    margin-bottom: 25px;
}

@media (max-width: 768px) {
    .page-header .btn {
        position: static;
        margin-top: 15px;
    }
    
    .filter-bar {
        flex-direction: column;
        align-items: stretch;
    }
    
    .search-box input {
        width: 100%;
    }
    
    .articles-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<script nonce="{{ request.nonce }}">
let currentPage = 1;
let loading = false;
let hasMore = true;
let currentSort = '{{ request.args.get("sort", "latest") }}';
let currentSearch = '{{ request.args.get("q", "") }}';

document.addEventListener('DOMContentLoaded', function() {
    loadArticles(true);
    
    // 搜索按钮点击事件
    const searchBtn = document.getElementById('searchBtn');
    if (searchBtn) {
        searchBtn.addEventListener('click', searchArticles);
    }
    
    // 搜索输入框回车事件
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchArticles();
            }
        });
    }
    
    // 加载更多按钮点击事件
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (loadMoreBtn) {
        loadMoreBtn.addEventListener('click', loadMoreArticles);
    }
    
    // 筛选标签点击事件
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function(e) {
            e.preventDefault();
            const url = new URL(this.href);
            currentSort = url.searchParams.get('sort') || 'latest';
            currentPage = 1;
            
            // 更新URL
            window.history.pushState({}, '', this.href);
            
            loadArticles(true);
        });
    });
});

async function loadArticles(reset = false) {
    if (loading) return;
    
    if (reset) {
        currentPage = 1;
        hasMore = true;
        document.getElementById('articlesList').innerHTML = '';
    }
    
    if (!hasMore) return;
    
    loading = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loadMore').style.display = 'none';
    
    try {
        const url = new URL('/user/articles', window.location.origin);
        url.searchParams.append('page', currentPage);
        url.searchParams.append('per_page', 10);
        url.searchParams.append('sort', currentSort);
        if (currentSearch) {
            url.searchParams.append('q', currentSearch);
        }
        
        console.log('Loading articles from:', url.toString());
        
        const response = await fetch(url, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });
        const data = await response.json();
        
        console.log('Received data:', data);
        
        if (data.success) {
            if (data.data.length === 0 && currentPage === 1) {
                document.getElementById('noResults').style.display = 'block';
                document.getElementById('loadMore').style.display = 'none';
            } else {
                document.getElementById('noResults').style.display = 'none';
                renderArticles(data.data);
                
                if (data.has_next) {
                    currentPage++;
                    document.getElementById('loadMore').style.display = 'block';
                } else {
                    hasMore = false;
                    document.getElementById('loadMore').style.display = 'none';
                }
            }
        } else {
            console.error('API returned error:', data);
        }
    } catch (error) {
        console.error('加载文章失败:', error);
    } finally {
        loading = false;
        document.getElementById('loading').style.display = 'none';
    }
}

function renderArticles(articles) {
    const container = document.getElementById('articlesList');
    
    if (!articles || articles.length === 0) {
        return;
    }
    
    articles.forEach(article => {
        const card = createArticleCard(article);
        container.appendChild(card);
    });
}

function createArticleCard(article) {
    const card = document.createElement('div');
    card.className = 'article-card';
    
    // 截取内容预览
    const excerpt = article.content && article.content.length > 200 ? 
        article.content.substring(0, 200) + '...' : 
        article.content || '';
    
    // 格式化时间
    let timeStr = '';
    try {
        const time = new Date(article.time);
        timeStr = time.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    } catch (e) {
        timeStr = article.time || '';
    }
    
    card.innerHTML = `
        <div class="article-header">
            <h3 class="article-title">
                <a href="/user/article/${article.arid}">${escapeHtml(article.title)}</a>
            </h3>
            <div class="article-meta">
                <span class="article-author">
                    <i class="fas fa-user-circle"></i>
                    ${escapeHtml(article.author.nickname)} (UID: ${article.author.uid})
                </span>
                <span><i class="far fa-clock"></i> ${timeStr}</span>
            </div>
        </div>
        <div class="article-content">
            <div class="article-excerpt">
                ${escapeHtml(excerpt)}
            </div>
            <div class="article-tags">
                <span class="tag category">文章</span>
                ${article.views > 1000 ? '<span class="tag popular">热门</span>' : ''}
                ${isNew(article.time) ? '<span class="tag new">最新</span>' : ''}
            </div>
        </div>
        <div class="article-footer">
            <div class="article-stats">
                <span><i class="far fa-eye"></i> ${article.views || 0}</span>
                <span><i class="far fa-heart"></i> ${article.likes || 0}</span>
                <span><i class="far fa-comment"></i> ${article.comment_count || 0}</span>
            </div>
            <a href="/user/article/${article.arid}" class="read-more">
                阅读全文 <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    `;
    
    return card;
}

function loadMoreArticles() {
    loadArticles();
}

function searchArticles() {
    const searchInput = document.getElementById('searchInput');
    if (!searchInput) return;
    
    currentSearch = searchInput.value.trim();
    currentPage = 1;
    
    // 更新URL参数
    const url = new URL(window.location);
    if (currentSearch) {
        url.searchParams.set('q', currentSearch);
    } else {
        url.searchParams.delete('q');
    }
    window.history.pushState({}, '', url);
    
    loadArticles(true);
}

function isNew(dateString) {
    try {
        const articleDate = new Date(dateString);
        const now = new Date();
        const diffDays = (now - articleDate) / (1000 * 60 * 60 * 24);
        return diffDays < 7;
    } catch (e) {
        return false;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
