{% extends "base-files/all.html" %}

{% block title %}错误请求 - 400{% endblock %}
{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-animation">
            <div class="error-icon">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <div class="error-number">
                4<span class="zero">0</span>0
            </div>
        </div>
        <div class="error-text">
            <h1>错误请求</h1>
            <p>抱歉，服务器无法理解您的请求。</p>
            <div class="error-details">
                <p>可能的原因：</p>
                <ul>
                    <li>请求格式错误</li>
                    <li>缺少必要的请求参数</li>
                    <li>请求参数不正确</li>
                </ul>
            </div>
        </div>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回上页
            </a>
            <button class="btn btn-outline" onclick="refreshPage()">
                <i class="fas fa-redo"></i> 刷新页面
            </button>
        </div>
        <div class="error-search">
            <p>或者，您可以在本站搜索其他内容：</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入关键词搜索...">
                <button class="btn btn-search" onclick="performSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </div>
</div>
<style nonce="{{ request.nonce }}">
.error-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 120px);
    padding: 40px 20px;
}
.error-content {
    text-align: center;
    max-width: 600px;
    width: 100%;
}
.error-animation {
    margin-bottom: 30px;
    position: relative;
}
.error-icon {
    font-size: 5rem;
    color: var(--danger);
    margin-bottom: 20px;
    animation: shake 2s infinite;
}
.error-number {
    font-size: 8rem;
    font-weight: 900;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 10px;
    color: var(--warning);
    display: inline-block;
    animation: blink 1.5s infinite;
}
.error-text h1 {
    font-size: 2.5rem;
    margin-bottom: 15px;
    font-weight: 700;
}
.error-text > p {
    font-size: 1.2rem;
    color: var(--text-secondary);
    margin-bottom: 25px;
    line-height: 1.5;
}
.error-details {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 20px;
    margin: 25px 0;
    border: 1px solid var(--border-color);
    text-align: left;
}
.error-details p {
    font-weight: 600;
}
.error-details ul {
    padding-left: 20px;
    margin: 0;
}
.error-details li {
    margin-bottom: 8px;
    line-height: 1.4;
}
.error-actions {
    gap: 15px;
    margin: 30px 0;
    flex-wrap: wrap;
    border: none;
    border-radius: 0 8px 8px 0;
    cursor: pointer;
}
.error-search {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid var(--border-color);
}
.error-search p {
    font-size: 1.2rem;
    color: var(--text-secondary);
}
.search-box {
    max-width: 400px;
    margin: 0 auto;
}
.search-box input {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
}
.search-box button {
    padding: 10px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
@media (max-width: 768px) {
    .error-number {
        font-size: 6rem;
    }
    .error-text h1 {
        font-size: 2rem;
    }
    .error-actions {
        flex-direction: column;
        align-items: center;
    }
    .btn {
        width: 100%;
        margin-bottom: 10px;
    }
}
</style>
<script nonce="{{ request.nonce }}">
function refreshPage() {
    window.location.reload();
}
function performSearch() {
    const query = document.getElementById('searchInput').value;
    if (query) {
        window.location.href = `/search?q=${encodeURIComponent(query)}`;
    }
}
</script>
