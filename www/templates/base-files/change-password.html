{% extends "base-files/all.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-key"></i>
            <h1>修改密码</h1>
        </div>

        <div class="auth-body">
            <form id="changePasswordForm" method="POST">
                <!-- 安全参数（隐藏字段） -->
                <input type="hidden" id="salt" name="salt">
                <input type="hidden" id="iterations" name="iterations">

                <!-- 旧密码输入框 -->
                <div class="form-group">
                    <input type="password" class="input-field" id="oldPassword" name="oldPassword" placeholder=" " required>
                    <label for="oldPassword" class="input-label">
                        <i class="fas fa-lock"></i> 旧密码
                    </label>
                    <button type="button" class="password-toggle" id="toggleOldPassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                    <div class="error-message" id="oldPassword-error">
                        请输入您的旧密码
                    </div>
                </div>

                <!-- 新密码输入框 -->
                <div class="form-group">
                    <input type="password" class="input-field" id="newPassword" name="newPassword" placeholder=" " required>
                    <label for="newPassword" class="input-label">
                        <i class="fas fa-lock"></i> 新密码
                    </label>
                    <button type="button" class="password-toggle" id="toggleNewPassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                    <div class="error-message" id="newPassword-error">
                        密码必须包含大小写字母和数字，长度8-30个字符
                    </div>
                </div>

                <!-- 确认密码输入框 -->
                <div class="form-group">
                    <input type="password" class="input-field" id="confirmPassword" name="confirmPassword" placeholder=" " required>
                    <label for="confirmPassword" class="input-label">
                        <i class="fas fa-lock"></i> 确认密码
                    </label>
                    <button type="button" class="password-toggle" id="toggleConfirmPassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                    <div class="error-message" id="confirmPassword-error">
                        两次输入的密码不一致
                    </div>
                </div>

                <!-- 验证码输入框 -->
                <div class="form-group">
                    <div class="captcha-group">
                        <div class="captcha-input">
                            <input type="text" class="input-field" id="captcha" name="captcha" placeholder=" " maxlength="6" autocomplete="off" required>
                            <label for="captcha" class="input-label">
                                <i class="fas fa-shield-alt"></i> 验证码
                            </label>
                        </div>
                        <div class="captcha-image" id="refreshCaptchaBtn">
                            <img src="/captcha" name="captcha" alt="验证码">
                        </div>
                    </div>
                    <div class="error-message" id="captcha-error">
                        请输入正确的验证码
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-check-circle"></i> 修改密码
                </button>
            </form>

            <div class="auth-footer">
                <a href="/{{ basic_url }}/profile"><i class="fas fa-arrow-left"></i> 返回个人资料</a>
            </div>
        </div>
    </div>
</div>

<style nonce="{{ request.nonce }}">
/* 您的现有样式保持不变 */
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
}

.auth-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    box-shadow: 0 10px 30px var(--shadow);
    padding: 40px;
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--border-color);
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-header i {
    font-size: 3rem;
    color: var(--primary);
    margin-bottom: 15px;
}

.auth-header h1 {
    font-size: 1.8rem;
    color: var(--text-primary);
    margin-bottom: 8px;
}

.form-group {
    position: relative;
    margin-bottom: 28px;
}

.input-field {
    width: 100%;
    padding: 18px 16px 10px 16px;
    border: none;
    border-bottom: 2px solid var(--border-color);
    background-color: transparent;
    font-size: 1rem;
    transition: all 0.3s ease;
    outline: none;
    color: var(--text-primary);
}

.input-field:focus {
    border-bottom-color: var(--primary);
}

.input-label {
    position: absolute;
    top: 18px;
    left: 16px;
    font-size: 1rem;
    color: var(--text-secondary);
    pointer-events: none;
    transition: all 0.3s ease;
}

.input-field:focus + .input-label,
.input-field:not(:placeholder-shown) + .input-label {
    top: 2px;
    left: 12px;
    font-size: 0.8rem;
    color: var(--primary);
    font-weight: 600;
}

.error-message {
    display: none;
    color: var(--danger);
    font-size: 0.8rem;
    margin-top: 6px;
    padding-left: 5px;
}

.password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.3s ease;
}

.password-toggle:hover {
    color: var(--primary);
}

.captcha-group {
    display: flex;
    gap: 10px;
}

.captcha-input {
    flex: 1;
}

.captcha-image {
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border-color);
    width: 120px;
    height: 40px;
    background: var(--bg-primary);
}

.captcha-image img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.btn-primary {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 20px;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
}

.auth-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    font-size: 0.9rem;
}

.auth-footer a {
    color: var(--primary-light);
    text-decoration: none;
    transition: all 0.3s ease;
}

.auth-footer a:hover {
    color: var(--primary);
    text-decoration: underline;
}
</style>

<script nonce="{{ request.nonce }}">
document.addEventListener('DOMContentLoaded', function() {
    // DOM元素
    const changePasswordForm = document.getElementById('changePasswordForm');
    const oldPasswordInput = document.getElementById('oldPassword');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const captchaInput = document.getElementById('captcha');
    const saltInput = document.getElementById('salt');
    const iterationsInput = document.getElementById('iterations');
    const toggleOldPassword = document.getElementById('toggleOldPassword');
    const toggleNewPassword = document.getElementById('toggleNewPassword');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const refreshCaptchaBtn = document.getElementById('refreshCaptchaBtn');

    // 安全参数
    let currentSalt = '';
    let currentIterations = 0;

    // 页面加载时获取安全参数
    fetchPBKDF2Params();

    // 密码可见性切换
    if (toggleOldPassword) {
        toggleOldPassword.addEventListener('click', function() {
            const type = oldPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            oldPasswordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
    }

    if (toggleNewPassword) {
        toggleNewPassword.addEventListener('click', function() {
            const type = newPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            newPasswordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
    }

    if (toggleConfirmPassword) {
        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
    }

    // 刷新验证码
    if (refreshCaptchaBtn) {
        refreshCaptchaBtn.addEventListener('click', refreshCaptcha);
    }

    // 实时验证监听
    if (newPasswordInput) {
        newPasswordInput.addEventListener('input', function() {
            validateNewPassword();
            validatePasswordsMatch();
        });
    }

    if (confirmPasswordInput) {
        confirmPasswordInput.addEventListener('input', function() {
            validatePasswordsMatch();
        });
    }

    // 表单提交处理
    if (changePasswordForm) {
        changePasswordForm.addEventListener('submit', handleSubmit);
    }

    // 获取PBKDF2参数
    async function fetchPBKDF2Params() {
        try {
            const response = await fetch('/{{ basic_url }}/api/pbkdf2-salt');
            const data = await response.json();
            
            if (data.success) {
                currentSalt = data.salt;
                currentIterations = data.iterations;
                
                // 设置隐藏字段的值
                if (saltInput) saltInput.value = currentSalt;
                if (iterationsInput) iterationsInput.value = currentIterations;
                
                console.log('获取安全参数成功');
            } else {
                console.error('获取安全参数失败:', data.error);
                alert('安全初始化失败，请刷新页面重试');
            }
        } catch (error) {
            console.error('获取安全参数异常:', error);
            alert('网络错误，请检查连接后重试');
        }
    }

    // 实时验证函数
    function validateNewPassword() {
        const newPassword = newPasswordInput.value;
        const hasUpperCase = /[A-Z]/.test(newPassword);
        const hasLowerCase = /[a-z]/.test(newPassword);
        const hasNumber = /[0-9]/.test(newPassword);
        const isValid = newPassword.length >= 8 && newPassword.length <= 30 &&
                      hasUpperCase && hasLowerCase && hasNumber;

        const errorEl = document.getElementById('newPassword-error');
        if (newPassword.length === 0) {
            if (errorEl) errorEl.style.display = 'none';
        } else if (!isValid) {
            if (errorEl) errorEl.style.display = 'block';
        } else {
            if (errorEl) errorEl.style.display = 'none';
        }
    }

    function validatePasswordsMatch() {
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const errorEl = document.getElementById('confirmPassword-error');

        if (confirmPassword.length === 0) {
            if (errorEl) errorEl.style.display = 'none';
        } else if (newPassword !== confirmPassword) {
            if (errorEl) errorEl.style.display = 'block';
        } else {
            if (errorEl) errorEl.style.display = 'none';
        }
    }

    // PBKDF2哈希函数
    async function pbkdf2Hash(password, salt, iterations) {
        const encoder = new TextEncoder();
        const passwordBuffer = encoder.encode(password);
        const saltBuffer = encoder.encode(salt);
        
        const key = await crypto.subtle.importKey(
            'raw',
            passwordBuffer,
            { name: 'PBKDF2' },
            false,
            ['deriveBits']
        );
        
        const derivedBits = await crypto.subtle.deriveBits(
            {
                name: 'PBKDF2',
                salt: saltBuffer,
                iterations: iterations,
                hash: 'SHA-256'
            },
            key,
            256
        );
        
        const hashArray = Array.from(new Uint8Array(derivedBits));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 表单提交处理
    async function handleSubmit(e) {
        e.preventDefault();

        // 获取表单值
        const oldPassword = oldPasswordInput.value;
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const captcha = captchaInput.value;

        // 验证表单
        const isOldPasswordValid = oldPassword.length > 0;
        const hasUpperCase = /[A-Z]/.test(newPassword);
        const hasLowerCase = /[a-z]/.test(newPassword);
        const hasNumber = /[0-9]/.test(newPassword);
        const isNewPasswordValid = newPassword.length >= 8 && newPassword.length <= 30 &&
                                  hasUpperCase && hasLowerCase && hasNumber;
        const isConfirmPasswordValid = newPassword === confirmPassword;
        const isCaptchaValid = captcha.length > 0;

        // 显示错误信息
        const oldPasswordError = document.getElementById('oldPassword-error');
        const newPasswordError = document.getElementById('newPassword-error');
        const confirmPasswordError = document.getElementById('confirmPassword-error');
        const captchaError = document.getElementById('captcha-error');

        if (oldPasswordError) oldPasswordError.style.display = !isOldPasswordValid ? 'block' : 'none';
        if (newPasswordError) newPasswordError.style.display = !isNewPasswordValid ? 'block' : 'none';
        if (confirmPasswordError) confirmPasswordError.style.display = !isConfirmPasswordValid ? 'block' : 'none';
        if (captchaError) captchaError.style.display = !isCaptchaValid ? 'block' : 'none';

        // 如果验证通过且有安全参数
        if (isOldPasswordValid && isNewPasswordValid && isConfirmPasswordValid && isCaptchaValid && currentSalt) {
            
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 修改中...';
            }

            try {
                // 使用PBKDF2哈希密码
                const hashedOldPassword = await pbkdf2Hash(oldPassword, currentSalt, currentIterations);
                const hashedNewPassword = await pbkdf2Hash(newPassword, currentSalt, currentIterations);

                // 准备表单数据
                const formData = new FormData();
                formData.append('oldPassword', hashedOldPassword);
                formData.append('newPassword', hashedNewPassword);
                formData.append('confirmPassword', hashedNewPassword);
                formData.append('captcha', captcha);
                formData.append('salt', currentSalt);
                formData.append('iterations', currentIterations.toString());

                // 发送请求
                const response = await fetch('/{{ basic_url }}/change-password', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(data.success || '密码修改成功');
                    window.location.href = '/{{ basic_url }}/profile';
                } else {
                    alert(data.error || '密码修改失败');
                    refreshCaptcha();
                    await fetchPBKDF2Params();
                }
            } catch (error) {
                console.error('修改密码失败:', error);
                alert('网络错误，请稍后重试');
                await fetchPBKDF2Params();
            } finally {
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> 修改密码';
                }
            }
        } else if (!currentSalt) {
            alert('安全参数未就绪，请稍后重试');
            await fetchPBKDF2Params();
        }
    }

    // 刷新验证码
    function refreshCaptcha() {
        const img = document.querySelector('img[name="captcha"]');
        if (img) {
            img.src = '/captcha?' + new Date().getTime();
        }
        if (captchaInput) {
            captchaInput.value = '';
        }
    }

    // 初始时隐藏错误信息
    const errorIds = ['oldPassword-error', 'newPassword-error', 'confirmPassword-error', 'captcha-error'];
    errorIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });
});
</script>
{% endblock %}
