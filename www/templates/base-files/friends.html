{% extends "base-files/all.html" %}

{% block title %}好友管理 - FreeHub{% endblock %}

{% block styles %}
<style nonce="{{ request.nonce }}">
.friends-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
}

.page-header {
    text-align: center;
    margin-bottom: 30px;
}

.page-header h1 {
    font-size: 2.5rem;
    color: var(--text-primary);
}

.page-header h1 i {
    color: var(--primary);
    margin-right: 10px;
}

.tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    border: 1px solid var(--border-color);
}

.tab-btn {
    flex: 1;
    padding: 12px 20px;
    background: transparent;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s ease;
}

.tab-btn.active {
    background: var(--primary);
    color: white;
}

.friends-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
}

.friend-card {
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 15px;
}

.friend-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px var(--shadow);
}

.friend-avatar {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.friend-avatar i {
    font-size: 1.5rem;
    color: white;
}

.friend-info {
    flex: 1;
    min-width: 0;
}

.friend-name {
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
}

.friend-level {
    font-size: 0.7rem;
    color: var(--text-muted);
}

.friend-bio {
    font-size: 0.8rem;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.friend-actions {
    display: flex;
    gap: 8px;
}

.friend-actions button {
    padding: 6px 10px;
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    border-radius: 6px;
    cursor: pointer;
}

.friend-actions button:hover {
    background: var(--primary);
    color: white;
}

.request-item {
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 16px 20px;
    border: 1px solid var(--border-color);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}

.request-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.request-avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
}

.request-avatar i {
    font-size: 1.2rem;
    color: white;
}

.request-details .name {
    font-weight: 600;
    color: var(--text-primary);
}

.request-details .message {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
}

.request-actions {
    display: flex;
    gap: 8px;
}

.accept-btn {
    background: var(--success);
    color: white;
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.reject-btn {
    background: var(--danger);
    color: white;
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.empty-state {
    text-align: center;
    padding: 60px;
    background: var(--bg-secondary);
    border-radius: 16px;
    color: var(--text-muted);
}

.empty-state i {
    font-size: 3rem;
    margin-bottom: 15px;
    opacity: 0.5;
}

.loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 10px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    z-index: 1000;
    font-size: 0.9rem;
}

.toast.success {
    border-color: #4caf50;
    color: #4caf50;
}

.toast.error {
    border-color: #f44336;
    color: #f44336;
}
</style>
{% endblock %}

{% block content %}
<div class="friends-container">
    <div class="page-header">
        <h1><i class="fas fa-user-friends"></i> 好友管理</h1>
        <p>管理您的好友关系和黑名单</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="friends">👥 我的好友</button>
        <button class="tab-btn" data-tab="requests">📨 好友申请</button>
        <button class="tab-btn" data-tab="blocked">🚫 黑名单</button>
    </div>

    <div id="friends-tab">
        <div id="friends-list" class="friends-grid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>

    <div id="requests-tab" style="display: none;">
        <div id="requests-list">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>

    <div id="blocked-tab" style="display: none;">
        <div id="blocked-list" class="friends-grid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>
</div>

<script nonce="{{ request.nonce }}">
let currentTab = 'friends';

async function loadFriends() {
    const container = document.getElementById('friends-list');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
    
    try {
        const response = await fetch('/user/api/friends/list');
        const data = await response.json();
        
        if (!data.success) {
            container.innerHTML = '<div class="empty-state">加载失败</div>';
            return;
        }
        
        if (data.data.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-user-friends"></i><p>暂无好友</p></div>';
            return;
        }
        
        container.innerHTML = data.data.map(friend => `
            <div class="friend-card" data-uid="${friend.uid}">
                <div class="friend-avatar"><i class="fas fa-user"></i></div>
                <div class="friend-info">
                    <div class="friend-name">${escapeHtml(friend.nickname)} <span class="friend-level">Lv.${friend.level}</span></div>
                    <div class="friend-bio">${escapeHtml(friend.bio || '这个人很懒')}</div>
                </div>
                <div class="friend-actions">
                    <button class="message-friend-btn" data-uid="${friend.uid}"><i class="fas fa-comment"></i> 私信</button>
                    <button class="delete-friend-btn" data-uid="${friend.uid}"><i class="fas fa-trash"></i> 删除</button>
                </div>
            </div>
        `).join('');
        
        // 绑定私信按钮事件
        document.querySelectorAll('.message-friend-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const uid = btn.dataset.uid;
                window.location.href = `/user/messages/${uid}`;
            });
        });
        
        // 绑定删除按钮事件
        document.querySelectorAll('.delete-friend-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const uid = btn.dataset.uid;
                deleteFriend(uid);
            });
        });
        
    } catch (error) {
        container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

async function loadRequests() {
    const container = document.getElementById('requests-list');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
    
    try {
        const response = await fetch('/user/api/friends/requests');
        const data = await response.json();
        
        if (!data.success) {
            container.innerHTML = '<div class="empty-state">加载失败</div>';
            return;
        }
        
        if (data.data.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无好友申请</p></div>';
            return;
        }
        
        container.innerHTML = data.data.map(req => `
            <div class="request-item" data-id="${req.id}">
                <div class="request-info">
                    <div class="request-avatar"><i class="fas fa-user"></i></div>
                    <div class="request-details">
                        <div class="name">${escapeHtml(req.nickname)} <span class="friend-level">Lv.${req.level}</span></div>
                        ${req.message ? `<div class="message">附言：${escapeHtml(req.message)}</div>` : ''}
                    </div>
                </div>
                <div class="request-actions">
                    <button class="accept-request-btn" data-id="${req.id}">接受</button>
                    <button class="reject-request-btn" data-id="${req.id}">拒绝</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.accept-request-btn').forEach(btn => {
            btn.addEventListener('click', () => handleRequest(btn.dataset.id, 'accept'));
        });
        document.querySelectorAll('.reject-request-btn').forEach(btn => {
            btn.addEventListener('click', () => handleRequest(btn.dataset.id, 'reject'));
        });
        
    } catch (error) {
        container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

async function loadBlocked() {
    const container = document.getElementById('blocked-list');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
    
    try {
        const response = await fetch('/user/api/block/list');
        const data = await response.json();
        
        if (!data.success) {
            container.innerHTML = '<div class="empty-state">加载失败</div>';
            return;
        }
        
        if (data.data.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-ban"></i><p>暂无拉黑用户</p></div>';
            return;
        }
        
        container.innerHTML = data.data.map(user => `
            <div class="friend-card" data-uid="${user.uid}">
                <div class="friend-avatar"><i class="fas fa-user"></i></div>
                <div class="friend-info">
                    <div class="friend-name">${escapeHtml(user.nickname)} <span class="friend-level">Lv.${user.level}</span></div>
                    ${user.reason ? `<div class="friend-bio">原因：${escapeHtml(user.reason)}</div>` : ''}
                </div>
                <div class="friend-actions">
                    <button class="unblock-btn" data-uid="${user.uid}">取消拉黑</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.unblock-btn').forEach(btn => {
            btn.addEventListener('click', () => unblockUser(btn.dataset.uid));
        });
        
    } catch (error) {
        container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

async function handleRequest(requestId, action) {
    try {
        const response = await fetch(`/user/api/friends/request/${requestId}/${action}`, { method: 'POST' });
        const data = await response.json();
        if (data.success) {
            showToast(data.message, 'success');
            loadRequests();
            loadFriends();
        } else {
            showToast(data.error, 'error');
        }
    } catch (error) {
        showToast('操作失败', 'error');
    }
}

async function deleteFriend(uid) {
    if (!confirm('确定要删除这个好友吗？')) return;
    try {
        const response = await fetch('/user/api/friends/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid: uid })
        });
        const data = await response.json();
        if (data.success) {
            showToast(data.message, 'success');
            loadFriends();
        } else {
            showToast(data.error, 'error');
        }
    } catch (error) {
        showToast('操作失败', 'error');
    }
}

async function unblockUser(uid) {
    try {
        const response = await fetch('/user/api/block/remove', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid: uid })
        });
        const data = await response.json();
        if (data.success) {
            showToast(data.message, 'success');
            loadBlocked();
        } else {
            showToast(data.error, 'error');
        }
    } catch (error) {
        showToast('操作失败', 'error');
    }
}

function showToast(message, type) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${escapeHtml(message)}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentTab = this.dataset.tab;
        document.getElementById('friends-tab').style.display = currentTab === 'friends' ? 'block' : 'none';
        document.getElementById('requests-tab').style.display = currentTab === 'requests' ? 'block' : 'none';
        document.getElementById('blocked-tab').style.display = currentTab === 'blocked' ? 'block' : 'none';
        if (currentTab === 'friends') loadFriends();
        else if (currentTab === 'requests') loadRequests();
        else if (currentTab === 'blocked') loadBlocked();
    });
});

loadFriends();
</script>
{% endblock %}
