{% extends "base-files/all.html" %}

{% block title %}访问被拒绝 - 403{% endblock %}
{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-animation">
            <div class="error-icon">
                <i class="fas fa-ban"></i>
            </div>
            <div class="error-number">
                4<span class="zero">0</span>3
            </div>
        </div>
        <div class="error-text">
            <h1>访问被拒绝</h1>
            <p>抱歉，您没有权限访问此页面。</p>
            <div class="error-details">
                <p>可能的原因：</p>
                <ul>
                    <li>您尚未登录或会话已过期</li>
                    <li>您的账户权限不足</li>
                    <li>此页面需要特殊权限才能访问</li>
                    <li>资源受到保护或限制访问</li>
                </ul>
            </div>
        </div>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a href="/user/login" class="btn btn-secondary">
                <i class="fas fa-sign-in-alt"></i> 重新登录
            </a>
            <a href="/contact" class="btn btn-outline">
                <i class="fas fa-envelope"></i> 联系管理员
            </a>
        </div>
        <div class="error-search">
            <p>或者，您可以在本站搜索其他内容：</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入关键词搜索...">
                <button class="btn btn-search" onclick="performSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </div>
</div>
<style nonce="{{ request.nonce }}">
.error-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 120px);
    padding: 40px 20px;
}
.error-content {
    text-align: center;
    max-width: 600px;
    width: 100%;
}
.error-animation {
    margin-bottom: 30px;
    position: relative;
}
.error-icon {
    font-size: 5rem;
    color: var(--danger);
    margin-bottom: 20px;
    animation: shake 2s infinite;
}
.error-number {
    font-size: 8rem;
    font-weight: 900;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 10px;
    color: var(--warning);
    display: inline-block;
    animation: blink 1.5s infinite;
}
.error-text h1 {
    font-size: 2.5rem;
    margin-bottom: 15px;
    font-weight: 700;
}
.error-text p {
    font-size: 1.2rem;
    color: var(--text-secondary);
    margin-bottom: 25px;
    line-height: 1.5;
}
.error-details {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 20px;
    margin: 25px 0;
    border: 1px solid var(--border-color);
    text-align: left;
}
.error-details p {
    font-weight: 600;
}
.error-details ul {
    padding-left: 20px;
    margin: 0;
}
.error-details li {
    margin-bottom: 8px;
    line-height: 1.4;
}
.error-actions {
    gap: 15px;
    margin: 30px 0;
    flex-wrap: wrap;
    border: none;
    border-radius: 0 8px 8px 0;
    cursor: pointer;
}
.error-actions a {
    text-decoration: none;
    color: white;
    display: inline-block;
    padding: 10px 20px;
    border-radius: 4px;
}
.error-actions a.btn-primary {
    background: var(--primary);
}
.error-actions a.btn-secondary {
    background: var(--secondary);
}
.error-actions a.btn-outline {
    background: transparent;
    border: 1px solid var(--primary);
    color: var(--primary);
}
.error-search {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid var(--border-color);
}
.error-search p {
    font-size: 1.2rem;
    color: var(--text-secondary);
}
.search-box {
    max-width: 400px;
    margin: 0 auto;
    display: flex;
}
.search-box input {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    margin-right: 5px;
}
.search-box button {
    padding: 10px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
@media (max-width: 768px) {
    .error-number {
        font-size: 6rem;
    }
    .error-text h1 {
        font-size: 2rem;
    }
    .error-actions {
        flex-direction: column;
        align-items: center;
    }
    .error-actions a {
        width: 100%;
        margin-bottom: 10px;
    }
}
</style>
<script nonce="{{ request.nonce }}">
function performSearch() {
    const query = document.getElementById('searchInput').value;
    if (query) {
        window.location.href = `/search?q=${encodeURIComponent(query)}`;
    }
}
</script>
{% endblock %}
