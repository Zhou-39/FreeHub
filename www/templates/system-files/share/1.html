<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>真正的时空弯曲与光线测地线 - 广义相对论精确可视化</title>
    <style nonce="{{ request.nonce }}">
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.75);
            padding: 12px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            z-index: 10;
            font-size: 14px;
            border-left: 4px solid #ffaa44;
            pointer-events: none;
            font-family: monospace;
        }
        #info h1 {
            margin: 0 0 5px;
            font-size: 1.2rem;
        }
        #info p {
            margin: 0;
            font-size: 0.85rem;
            opacity: 0.9;
        }
        .note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; padding: 6px 12px; }
            .instruction { font-size: 9px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🌌 时空弯曲与光线测地线 | 广义相对论</h1>
        <p>光线严格沿着弯曲时空曲面传播 | 三维空间曲率 + 光线跟随时空变形</p>
    </div>
    <div class="note">
        📐 时空网格凹陷表示质量引起的曲率 | 光线完全贴合弯曲表面传播
    </div>
    <div class="instruction">
        🖱️ 鼠标拖拽旋转视角 | 右键平移 | 滚动缩放 | 观察光线如何沿曲面弯曲
    </div>

    <script type="importmap" nonce="{{ request.nonce }}">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" nonce="{{ request.nonce }}">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030318);
        scene.fog = new THREE.FogExp2(0x030318, 0.0005);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(9, 6, 10);
        camera.lookAt(0, -0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- 控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, -0.6, 0);

        // --- 星空背景 ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- 创建弯曲时空网格 (精确曲面，光线将贴合此曲面) ---
        // 使用高斯型凹陷 + 径向衰减，模拟史瓦西度规的嵌入图
        const gridSize = 14;
        const divisions = 150; // 高细分确保光线平滑
        const planeGeometry = new THREE.PlaneGeometry(gridSize, gridSize, divisions, divisions);
        planeGeometry.rotateX(-Math.PI / 2);
        
        const positions = planeGeometry.attributes.position.array;
        // 存储每个顶点的原始坐标和高度，用于光线采样
        const heightMap = new Map();
        
        // 定义曲面高度函数: 模拟质量引起的时空弯曲 (嵌入维度)
        function getSurfaceHeight(x, z) {
            const r = Math.sqrt(x*x + z*z);
            // 更精确的弯曲形状: 类似 -1/(r+0.5) 但平滑处理，模拟引力势阱
            let height = 0;
            if (r < 5.0) {
                // 主凹陷区
                height = -1.5 / (r + 0.6);
                // 中心额外加深
                height += -0.8 * Math.exp(-r * r / 1.8);
                // 限制最大深度
                if (height < -2.4) height = -2.4;
            } else {
                // 过渡区
                height = -0.4 / (r - 2.0);
                if (height > -0.05) height = -0.05;
                if (height < -0.6) height = -0.6;
            }
            // 边缘平滑归零
            if (r > 6.2) {
                const factor = Math.max(0, 1 - (r - 6.2) / 1.5);
                height = height * factor;
            }
            return height;
        }
        
        // 应用高度到网格
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i+2];
            const y = getSurfaceHeight(x, z);
            positions[i+1] = y;
            // 存储高度映射用于光线插值
            const key = `${x.toFixed(2)},${z.toFixed(2)}`;
            heightMap.set(key, y);
        }
        
        planeGeometry.computeVertexNormals();
        
        // 主网格材质 (半透明展示曲面)
        const gridMaterial = new THREE.MeshPhongMaterial({
            color: 0x3a86ff,
            emissive: 0x001133,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.55,
            shininess: 70,
            flatShading: false
        });
        const curvedPlane = new THREE.Mesh(planeGeometry, gridMaterial);
        scene.add(curvedPlane);
        
        // 添加高光线框增强视觉
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x66aaff,
            wireframe: true,
            transparent: true,
            opacity: 0.2
        });
        const wireframeMesh = new THREE.Mesh(planeGeometry, wireframeMaterial);
        scene.add(wireframeMesh);
        
        // 添加等高线效果: 在曲面上绘制一些环
        const contourPoints = [];
        for (let r = 1.2; r <= 5.5; r += 0.8) {
            const segments = 64;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;
                const y = getSurfaceHeight(x, z);
                contourPoints.push(new THREE.Vector3(x, y, z));
            }
        }
        const contourGeo = new THREE.BufferGeometry().setFromPoints(contourPoints);
        const contourMat = new THREE.LineBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3 });
        const contourLines = new THREE.LineSegments(contourGeo, contourMat);
        scene.add(contourLines);
        
        // --- 中心质量球体 ---
        const coreSphereGeometry = new THREE.SphereGeometry(0.88, 96, 96);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0xffaa55,
            emissive: 0x442200,
            emissiveIntensity: 0.7,
            metalness: 0.8,
            roughness: 0.2
        });
        const centralMass = new THREE.Mesh(coreSphereGeometry, coreMaterial);
        centralMass.castShadow = true;
        scene.add(centralMass);
        
        // 光晕效果
        const glowGeometry = new THREE.SphereGeometry(1.08, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xffaa66,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glowSphere);
        
        // 周围粒子
        const particleCount = 600;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 1.2 + Math.random() * 1.3;
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = y;
            particlePositions[i*3+2] = z;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffaa77, size: 0.03, transparent: true, blending: THREE.AdditiveBlending });
        const dustParticles = new THREE.Points(particleGeo, particleMat);
        scene.add(dustParticles);
        
        // --- 核心改进: 光线严格沿着曲面传播 ---
        // 光线上的每个点都通过曲面高度函数获取正确的 Y 坐标
        // 这样光线就会完全贴合弯曲的时空网格，真正体现"沿着弯曲时空传播"
        
        // 辅助函数: 在曲面上插值获取精确点
        function getPointOnSurface(x, z) {
            const y = getSurfaceHeight(x, z);
            return new THREE.Vector3(x, y, z);
        }
        
        // 生成光线路径 (沿着曲面，并考虑引力偏折导致路径弯曲)
        // 使用测地线近似: 路径在 XZ 平面上弯曲，同时 Y 跟随曲面
        // 模拟光线在弯曲时空中的轨迹: 在 XZ 平面内，路径向中心弯曲，同时高度随曲面变化
        
        function generateGeodesicRay(impactParam, startX, endX, segments = 150) {
            const points = [];
            // 在 XZ 平面内计算弯曲路径的 (x, z) 坐标
            // 使用更精确的偏折模型: 路径受中心质量吸引，偏折程度与 impact parameter 相关
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const x = startX + t * (endX - startX);
                
                // 计算在 XZ 平面内的偏折: 光线会向中心 (z=0) 弯曲
                // 偏折强度与 impact 成反比，且中心区域最强
                let zOffset = 0;
                const absX = Math.abs(x);
                const strength = 2.2 / (impactParam + 0.5);
                
                if (absX < 4.5) {
                    // 核心弯曲区
                    const gaussian = Math.exp(-x*x / 3.5);
                    const lorentz = 1.0 / (absX + 0.4);
                    zOffset = strength * (gaussian * 0.8 + lorentz * 0.6);
                } else if (absX < 7) {
                    zOffset = strength * (0.5 / (absX - 2.0));
                }
                
                // 最终 Z 坐标: 初始 impact - 弯曲偏移
                let z = impactParam - zOffset;
                // 确保光线不会穿过中心球体
                if (Math.abs(z) < 0.45 && Math.abs(x) < 1.2) {
                    z = Math.sign(z) * 0.45;
                }
                // 远处恢复原 impact
                if (absX > 6) {
                    const factor = 1 - (absX - 6) / 2;
                    if (factor > 0) {
                        z = impactParam - zOffset * factor;
                    }
                }
                
                // 关键: 根据 (x, z) 获取曲面上的 Y 坐标
                const pointOnSurface = getPointOnSurface(x, z);
                points.push(pointOnSurface);
            }
            return points;
        }
        
        // 定义多条光线，不同的瞄准距离
        const raysConfig = [
            { color: 0xff6666, impact: 1.1, width: 0.12, name: "近距光线 (强弯曲)", emissive: 0xff4422 },
            { color: 0xffaa66, impact: 1.9, width: 0.1, name: "中距光线", emissive: 0xff8844 },
            { color: 0xffdd88, impact: 2.8, width: 0.09, name: "远距光线 (弱弯曲)", emissive: 0xffaa66 },
            { color: 0x88aaff, impact: 3.8, width: 0.07, name: "极远光线 (微弯曲)", emissive: 0x88aaff }
        ];
        
        const rayObjects = [];
        
        // 创建光线和流动粒子
        raysConfig.forEach((ray, idx) => {
            const points = generateGeodesicRay(ray.impact, -6.8, 7.2, 180);
            
            // 创建曲线路径
            const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const lineMaterial = new THREE.LineBasicMaterial({ color: ray.color, linewidth: 1 });
            const curveLine = new THREE.Line(lineGeometry, lineMaterial);
            scene.add(curveLine);
            
            // 添加发光光晕效果 (沿着线的点光源)
            const glowPoints = [];
            for (let i = 0; i < points.length; i += 8) {
                const point = points[i];
                const glowGeo = new THREE.SphereGeometry(0.035, 6, 6);
                const glowMat = new THREE.MeshStandardMaterial({
                    color: ray.color,
                    emissive: ray.color,
                    emissiveIntensity: 0.4,
                    transparent: true
                });
                const glowSphereObj = new THREE.Mesh(glowGeo, glowMat);
                glowSphereObj.position.copy(point);
                scene.add(glowSphereObj);
                glowPoints.push(glowSphereObj);
            }
            
            // 创建流动粒子 (沿光线移动，严格贴合曲面)
            const flowParticleCount = 35;
            const flowParticles = [];
            for (let i = 0; i < flowParticleCount; i++) {
                const particleGeo = new THREE.SphereGeometry(0.05, 16, 16);
                const particleMat = new THREE.MeshStandardMaterial({
                    color: ray.color,
                    emissive: ray.color,
                    emissiveIntensity: 0.8,
                    metalness: 0.3
                });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                scene.add(particle);
                flowParticles.push(particle);
            }
            
            rayObjects.push({
                points: points,
                particles: flowParticles,
                speed: 0.008,
                offsets: flowParticles.map((_, idx) => idx / flowParticleCount),
                color: ray.color,
                glowSpheres: glowPoints
            });
        });
        
        // --- 添加额外的环形光线 (光子环示意) 完全贴合曲面 ---
        const photonRingPoints = [];
        for (let angle = 0; angle <= Math.PI * 2; angle += 0.05) {
            const r = 1.95;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const y = getSurfaceHeight(x, z);
            photonRingPoints.push(new THREE.Vector3(x, y, z));
        }
        const ringGeo = new THREE.BufferGeometry().setFromPoints(photonRingPoints);
        const ringMat = new THREE.LineBasicMaterial({ color: 0xffaa88, linewidth: 1 });
        const photonRing = new THREE.Line(ringGeo, ringMat);
        scene.add(photonRing);
        
        // 第二个更大的光环
        const photonRingPoints2 = [];
        for (let angle = 0; angle <= Math.PI * 2; angle += 0.05) {
            const r = 2.65;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const y = getSurfaceHeight(x, z);
            photonRingPoints2.push(new THREE.Vector3(x, y, z));
        }
        const ringGeo2 = new THREE.BufferGeometry().setFromPoints(photonRingPoints2);
        const ringMat2 = new THREE.LineBasicMaterial({ color: 0xff8866, transparent: true, opacity: 0.6 });
        const photonRing2 = new THREE.Line(ringGeo2, ringMat2);
        scene.add(photonRing2);
        
        // --- 光源系统 ---
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 8, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4488ff, 0.4);
        fillLight.position.set(-2, 2, -3);
        scene.add(fillLight);
        
        const coreLight = new THREE.PointLight(0xff8844, 0.9, 12);
        coreLight.position.set(0, getSurfaceHeight(0, 0), 0);
        scene.add(coreLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, -0.5, -4);
        scene.add(backLight);
        
        // --- CSS2D 文字标签 ---
        function addLabel(text, color, position, fontSize = '0.85rem') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = fontSize;
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0px black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '20px';
            div.style.borderLeft = `3px solid ${color}`;
            div.style.fontFamily = 'monospace';
            div.style.backdropFilter = 'blur(4px)';
            const label = new CSS2DObject(div);
            label.position.copy(position);
            scene.add(label);
        }
        
        addLabel('⚡ 大质量天体', '#ffaa66', new THREE.Vector3(0, 1.3, 0), '0.9rem');
        addLabel('弯曲时空网格', '#88aaff', new THREE.Vector3(4.2, -1.5, 2.5), '0.75rem');
        addLabel('光线沿曲面传播', '#ff8888', new THREE.Vector3(-5.5, -0.8, 1.8), '0.75rem');
        addLabel('测地线弯曲', '#ffaa88', new THREE.Vector3(3.5, -1.2, -2.2), '0.7rem');
        addLabel('光子环', '#ffaa88', new THREE.Vector3(2.2, 0.3, 2.2), '0.7rem');
        
        // --- 动画: 光线粒子沿曲面流动 ---
        let time = 0;
        function animateRayParticles() {
            time += 0.014;
            rayObjects.forEach(rayData => {
                const points = rayData.points;
                const particles = rayData.particles;
                const total = particles.length;
                for (let i = 0; i < total; i++) {
                    let offset = (rayData.offsets[i] + time * rayData.speed) % 1.0;
                    const idxFloat = offset * (points.length - 1);
                    const idx1 = Math.floor(idxFloat);
                    const idx2 = Math.min(idx1 + 1, points.length - 1);
                    const frac = idxFloat - idx1;
                    if (idx1 < points.length && idx2 < points.length) {
                        const p1 = points[idx1];
                        const p2 = points[idx2];
                        particles[i].position.lerpVectors(p1, p2, frac);
                        // 粒子发光强度随位置变化
                        const intensity = 0.5 + Math.sin(Date.now() * 0.01 + i) * 0.3;
                        particles[i].material.emissiveIntensity = intensity;
                    }
                }
            });
            requestAnimationFrame(animateRayParticles);
        }
        animateRayParticles();
        
        // 粒子系统旋转
        function rotateParticles() {
            dustParticles.rotation.y += 0.005;
            dustParticles.rotation.x += 0.002;
            requestAnimationFrame(rotateParticles);
        }
        rotateParticles();
        
        // 中心球体脉动和光环旋转
        let ringAngle = 0;
        function animateRings() {
            ringAngle += 0.008;
            // 让光子环稍微旋转和浮动
            const newRingPoints = [];
            for (let angle = 0; angle <= Math.PI * 2; angle += 0.05) {
                const r = 1.95;
                const x = Math.cos(angle + ringAngle * 0.5) * r;
                const z = Math.sin(angle + ringAngle * 0.3) * r;
                const y = getSurfaceHeight(x, z);
                newRingPoints.push(new THREE.Vector3(x, y, z));
            }
            photonRing.geometry.dispose();
            photonRing.geometry = new THREE.BufferGeometry().setFromPoints(newRingPoints);
            
            requestAnimationFrame(animateRings);
        }
        animateRings();
        
        function pulseCore() {
            const scale = 1 + Math.sin(Date.now() * 0.003) * 0.01;
            centralMass.scale.set(scale, scale, scale);
            glowSphere.scale.set(scale * 1.02, scale * 1.02, scale * 1.02);
            coreLight.intensity = 0.8 + Math.sin(Date.now() * 0.004) * 0.2;
            requestAnimationFrame(pulseCore);
        }
        pulseCore();
        
        // 星空缓慢旋转
        function rotateStars() {
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0002;
            requestAnimationFrame(rotateStars);
        }
        rotateStars();
        
        // --- 添加粒子流展示光线传播方向 (从左侧射出，沿曲面传播) ---
        const streamParticleCount = 200;
        const streamParticles = [];
        for (let i = 0; i < streamParticleCount; i++) {
            const sphereGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa77, emissive: 0xff6622, emissiveIntensity: 0.4 });
            const particle = new THREE.Mesh(sphereGeo, sphereMat);
            scene.add(particle);
            streamParticles.push({
                mesh: particle,
                progress: Math.random(),
                rayIndex: Math.floor(Math.random() * rayObjects.length)
            });
        }
        
        function animateStream() {
            streamParticles.forEach(p => {
                p.progress += 0.003;
                if (p.progress >= 1) {
                    p.progress = 0;
                    p.rayIndex = Math.floor(Math.random() * rayObjects.length);
                }
                const rayData = rayObjects[p.rayIndex];
                if (rayData && rayData.points.length > 0) {
                    const idx = Math.floor(p.progress * (rayData.points.length - 1));
                    if (idx < rayData.points.length) {
                        p.mesh.position.copy(rayData.points[idx]);
                        // 根据位置调整发光强度
                        const distToCenter = Math.sqrt(p.mesh.position.x**2 + p.mesh.position.z**2);
                        const intensity = 0.3 + (1 - Math.min(1, distToCenter / 3)) * 0.7;
                        p.mesh.material.emissiveIntensity = intensity;
                    }
                }
            });
            requestAnimationFrame(animateStream);
        }
        animateStream();
        
        // --- 主渲染循环 ---
        function render() {
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(render);
        }
        render();
        
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('✓ 时空弯曲可视化已启动 | 光线严格沿着弯曲曲面传播，真正体现测地线原理');
    </script>
</body>
</html>
