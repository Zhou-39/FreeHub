{% extends "base-files/all.html" %}

{% block title %}忘记密码{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-key"></i>
            <h1>重置密码</h1>
        </div>

        <div class="auth-body">
            <div class="card-header">
                <h2>找回您的账户</h2>
                <p>请输入您的账户昵称或邮箱，我们将向您注册的邮箱发送密码重置链接</p>
            </div>

            <form id="forgotPasswordForm" method="POST" action="/{{ basic_url }}/forgot-password">
                <!-- 账号输入框 -->
                <div class="form-group">
                    <input type="text" class="input-field" id="account" name="account" placeholder=" " autocomplete="off" required>
                    <label for="account" class="input-label">
                        <i class="fas fa-user"></i> 昵称或邮箱
                    </label>
                    <div class="error-message" id="account-error">
                        请输入您注册时使用的昵称或邮箱
                    </div>
                </div>

                <!-- 验证码输入框 -->
                <div class="form-group">
                    <div class="captcha-group">
                        <div class="captcha-input">
                            <input type="text" class="input-field" id="captcha" name="captcha" placeholder=" " maxlength="6" autocomplete="off" required>
                            <label for="captcha" class="input-label">
                                <i class="fas fa-shield-alt"></i> 验证码
                            </label>
                        </div>
                        <div class="captcha-image" id="refreshCaptchaBtn">
                            <img src="/captcha" name="captcha" alt="验证码">
                        </div>
                    </div>
                    <div class="error-message" id="captcha-error">
                        请输入正确的验证码
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> 发送重置邮件
                </button>

                <div class="success-message" id="success-message">
                    <i class="fas fa-check-circle"></i>
                    <p>密码重置邮件已发送，请检查您的邮箱并按照邮件中的指示操作。</p>
                </div>
            </form>

            <div class="auth-footer">
                <a href="/{{ basic_url }}/login"><i class="fas fa-sign-in-alt"></i> 返回登录</a>
                <a href="/{{ basic_url }}/register"><i class="fas fa-user-plus"></i> 创建新账户</a>
            </div>
        </div>
    </div>
</div>

<style nonce="{{ request.nonce }}">
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
}

.auth-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    box-shadow: 0 10px 30px var(--shadow);
    padding: 40px;
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--border-color);
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-header i {
    font-size: 3rem;
    color: var(--primary);
    margin-bottom: 15px;
}

.auth-header h1 {
    font-size: 1.8rem;
    color: var(--text-primary);
    margin-bottom: 8px;
}

.card-header {
    text-align: center;
    margin-bottom: 30px;
}

.card-header h2 {
    font-size: 1.5rem;
    color: var(--text-primary);
    margin-bottom: 10px;
}

.card-header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.5;
}

.form-group {
    position: relative;
    margin-bottom: 28px;
}

.input-field {
    width: 100%;
    padding: 18px 16px 10px 16px;
    border: none;
    border-bottom: 2px solid var(--border-color);
    background-color: transparent;
    font-size: 1rem;
    transition: all 0.3s ease;
    outline: none;
    color: var(--text-primary);
}

.input-field:focus {
    border-bottom-color: var(--primary);
}

.input-label {
    position: absolute;
    top: 18px;
    left: 16px;
    font-size: 1rem;
    color: var(--text-secondary);
    pointer-events: none;
    transition: all 0.3s ease;
}

.input-field:focus + .input-label,
.input-field:not(:placeholder-shown) + .input-label {
    top: 2px;
    left: 12px;
    font-size: 0.8rem;
    color: var(--primary);
    font-weight: 600;
}

.error-message {
    display: none;
    color: var(--danger);
    font-size: 0.8rem;
    margin-top: 6px;
    padding-left: 5px;
}

.success-message {
    display: none;
    color: var(--success);
    font-size: 0.9rem;
    margin-top: 20px;
    padding: 15px;
    background-color: rgba(74, 222, 128, 0.1);
    border-radius: 8px;
    text-align: center;
    border: 1px solid rgba(74, 222, 128, 0.2);
}

.success-message i {
    font-size: 1.5rem;
    margin-bottom: 10px;
}

.success-message p {
    margin: 0;
    line-height: 1.4;
}

.captcha-group {
    display: flex;
    gap: 10px;
}

.captcha-input {
    flex: 1;
}

.captcha-image {
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border-color);
    width: 120px;
    height: 40px;
    background: var(--bg-primary);
}

.captcha-image img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.btn-primary {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 20px;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
}

.btn-primary:disabled {
    background: var(--text-secondary);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.auth-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
    font-size: 0.9rem;
}

.auth-footer a {
    color: var(--primary-light);
    text-decoration: none;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 5px;
}

.auth-footer a:hover {
    color: var(--primary);
    text-decoration: underline;
}

@media (max-width: 480px) {
    .auth-card {
        padding: 30px 25px;
    }
    
    .auth-footer {
        flex-direction: column;
        gap: 10px;
        align-items: center;
    }
}
</style>

<script nonce="{{ request.nonce }}">
document.addEventListener('DOMContentLoaded', function() {
    // DOM元素
    const forgotPasswordForm = document.getElementById('forgotPasswordForm');
    const accountInput = document.getElementById('account');
    const captchaInput = document.getElementById('captcha');
    const refreshCaptchaBtn = document.getElementById('refreshCaptchaBtn');
    const submitBtn = document.getElementById('submitBtn');
    const accountError = document.getElementById('account-error');
    const captchaError = document.getElementById('captcha-error');
    const successMessage = document.getElementById('success-message');

    // 刷新验证码
    if (refreshCaptchaBtn) {
        refreshCaptchaBtn.addEventListener('click', refreshCaptcha);
    }

    // 账号实时验证
    if (accountInput) {
        accountInput.addEventListener('input', function() {
            if (this.value.trim().length === 0) {
                if (accountError) accountError.style.display = 'none';
            } else {
                if (accountError) accountError.style.display = 'none';
            }
        });
    }

    // 验证码实时验证
    if (captchaInput) {
        captchaInput.addEventListener('input', function() {
            if (this.value.length === 0) {
                if (captchaError) captchaError.style.display = 'none';
            } else {
                if (captchaError) captchaError.style.display = 'none';
            }
        });
    }

    // 表单提交处理
    if (forgotPasswordForm) {
        forgotPasswordForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // 获取表单值
            const account = accountInput ? accountInput.value.trim() : '';
            const captcha = captchaInput ? captchaInput.value : '';

            // 验证账号
            const isAccountValid = account.length > 0;
            // 验证验证码
            const isCaptchaValid = captcha.length > 0;

            // 显示错误信息
            if (!isAccountValid && accountError) {
                accountError.style.display = 'block';
            }

            if (!isCaptchaValid && captchaError) {
                captchaError.style.display = 'block';
            }

            // 如果验证通过
            if (isAccountValid && isCaptchaValid) {
                // 禁用提交按钮
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
                }

                // 模拟表单数据提交
                const formData = new FormData();
                formData.append('account', account);
                formData.append('captcha', captcha);

                // 发送表单数据到服务器
                fetch('/{{ basic_url }}/forgot-password', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    // 重置表单
                    if (forgotPasswordForm) forgotPasswordForm.reset();

                    // 重置标签位置
                    document.querySelectorAll('.input-field').forEach(input => {
                        if (input.value === '') {
                            const label = input.nextElementSibling;
                            if (label && label.classList.contains('input-label')) {
                                label.style.top = '18px';
                                label.style.fontSize = '1rem';
                            }
                        }
                    });

                    if (data['success']) {
                        // 显示成功消息
                        if (successMessage) successMessage.style.display = 'block';
                        if (accountError) accountError.style.display = 'none';
                        if (captchaError) captchaError.style.display = 'none';

                        // 5秒后跳转
                        setTimeout(() => {
                            if (successMessage) successMessage.style.display = 'none';
                            window.location.href = '/{{ basic_url }}/login';
                        }, 5000);
                    } else {
                        // 显示错误消息
                        if (data['error'].includes('验证码')) {
                            if (captchaError) {
                                captchaError.textContent = data['error'];
                                captchaError.style.display = 'block';
                            }
                        } else {
                            if (accountError) {
                                accountError.textContent = data['error'];
                                accountError.style.display = 'block';
                            }
                        }
                    }
                })
                .catch(error => {
                    console.error('请求失败:', error);
                    if (accountError) {
                        accountError.textContent = '网络错误，请稍后重试';
                        accountError.style.display = 'block';
                    }
                })
                .finally(() => {
                    // 恢复提交按钮
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发送重置邮件';
                    }
                });
            }
        });
    }

    // 刷新验证码
    function refreshCaptcha() {
        const img = document.querySelector('img[name="captcha"]');
        if (img) {
            img.src = '/captcha?' + new Date().getTime();
        }
        if (captchaInput) {
            captchaInput.value = '';
        }
    }

    // 初始时隐藏错误信息
    if (accountError) accountError.style.display = 'none';
    if (captchaError) captchaError.style.display = 'none';
    if (successMessage) successMessage.style.display = 'none';
});
</script>
{% endblock %}
