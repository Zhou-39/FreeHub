<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支持我们 - 开发者社区</title>
    <style nonce="{{ request.nonce }}">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .highlight {
            color: #667eea;
            font-weight: 600;
        }

        .donate-image-wrapper {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }

        .donate-image-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 60%
            );
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .donate-image {
            max-width: 250px;
            width: 100%;
            height: auto;
            border-radius: 10px;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .donate-image:hover {
            transform: scale(1.05);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .feature-item {
            padding: 15px 10px;
            border-radius: 12px;
            background: #f8f9fa;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 13px;
            color: #555;
            line-height: 1.4;
        }

        .message {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            color: #333;
            font-size: 14px;
            line-height: 1.6;
        }

        .footer-text {
            color: #999;
            font-size: 13px;
            margin-top: 20px;
            line-height: 1.8;
        }

        .footer-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .donate-image {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-icon">💝</div>
        <h1>支持我们的开发</h1>
        <p class="subtitle">
            这是一个<span class="highlight">免费</span>的开发者社区<br>
            你的支持能让我们走得更远
        </p>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📚</div>
                <div class="feature-text">优质教程<br>持续更新</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🤝</div>
                <div class="feature-text">开源项目<br>共同维护</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">💡</div>
                <div class="feature-text">技术问答<br>互助成长</div>
            </div>
        </div>

        <div class="donate-image-wrapper">
            <img 
                src="/donate-image" 
                alt="捐赠二维码" 
                class="donate-image"
                loading="lazy"
            >
        </div>

        <div class="message">
            💬 每一份支持都是我们前进的动力<br>
            社区因你而更美好
        </div>

        <div class="footer-text">
            感谢你的慷慨 ❤️<br>
            <a href="/">返回社区首页</a>
        </div>
    </div>

    <script nonce="{{ request.nonce }}">
        // 图片加载优化
        document.addEventListener('DOMContentLoaded', function() {
            const donateImage = document.querySelector('.donate-image');
            
            if (donateImage) {
                donateImage.addEventListener('load', function() {
                    this.style.opacity = '1';
                });
                
                // 添加点击放大功能（可选）
                donateImage.addEventListener('click', function() {
                    this.classList.toggle('enlarged');
                });
            }
        });

        // 页面统计（可选）
        console.log('💝 感谢访问捐赠页面');
    </script>
</body>
</html>
